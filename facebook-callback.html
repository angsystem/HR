<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ANG HR Facebook 登入</title></head>
<body><main><h1>正在完成 Facebook 登入…</h1><p id="status">請稍候。</p></main>
<script src="./config.js"></script>
<script>
(async function () {
  'use strict';
  var status = document.getElementById('status');
  var params = new URLSearchParams(location.search);
  var state = params.get('state') || '';
  var expected = sessionStorage.getItem('ang_facebook_oauth_state') || '';
  sessionStorage.removeItem('ang_facebook_oauth_state');
  if (params.get('error')) { status.textContent = '登入已取消：' + (params.get('error_description') || params.get('error')); return; }
  if (!state || !expected || state !== expected) { status.textContent = '登入驗證失敗：state 不一致。請回 ANG HR 重新登入。'; return; }
  var code = params.get('code');
  var cfg = window.ANG_HR_CONFIG || {};
  if (!code) { status.textContent = 'Facebook 未回傳授權碼。'; return; }
  if (!cfg.facebookTokenExchangeUrl) { status.textContent = 'Facebook 後端交換端點尚未設定，授權碼未送出。'; return; }
  try {
    var response = await fetch(cfg.facebookTokenExchangeUrl, {
      method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'omit',
      body: JSON.stringify({ action:'facebookOAuthExchange', code:code, redirect_uri:cfg.facebookRedirectUri })
    });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var auth = await response.json();
    if (!auth || auth.ok !== true) throw new Error((auth && auth.message) || '後端驗證失敗');
    localStorage.setItem('ang_last_deep_link_auth_result', JSON.stringify(auth));
    status.textContent = '登入成功，正在返回 ANG HR…';
    location.replace('./index.html');
  } catch (error) { status.textContent = '登入失敗：' + error.message; }
})();
</script></body></html>
