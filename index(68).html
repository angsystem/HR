    <style id="ang-entry-five-plan-patch">
      /* ANG HR｜入口第一張卡：五個方案介紹＋iPhone 固定視窗修復｜2026-07-22 */
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        width: 100%;
        min-width: 0;
        height: 100%;
        margin: 0;
        overflow: hidden !important;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }
      #root, .landing {
        width: 100%;
        max-width: 100%;
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden !important;
      }
      .manager-carousel-wrap,
      .manager-carousel,
      .manager-card {
        max-width: 100vw;
        min-width: 0;
      }
      .manager-carousel {
        overflow-x: auto !important;
        overflow-y: hidden !important;
        overscroll-behavior-x: contain;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }
      .manager-card.intro.expanded .feature-modal-inline {
        display: block !important;
        width: 100%;
        min-width: 0;
        max-height: min(73dvh, 720px);
        padding: 12px 12px max(16px, env(safe-area-inset-bottom)) !important;
        overflow: hidden !important;
      }
      .ang-five-plan-shell {
        --plan-rgb: 47, 115, 217;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        gap: 10px;
        width: 100%;
        min-width: 0;
        height: 100%;
        color: #f7fbff;
      }
      .ang-five-plan-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .ang-five-plan-header > div { min-width: 0; }
      .ang-five-plan-header small {
        display: block;
        color: rgba(235, 243, 255, .68);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: .16em;
      }
      .ang-five-plan-header h2 {
        margin: 2px 0 0;
        color: #fff;
        font-size: clamp(18px, 5.2vw, 24px);
        line-height: 1.08;
      }
      .ang-five-plan-close {
        flex: 0 0 38px;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(255,255,255,.22);
        border-radius: 999px;
        background: rgba(0,0,0,.24);
        color: #fff;
        font-size: 23px;
        line-height: 1;
      }
      .ang-plan-showcase {
        position: relative;
        display: grid;
        grid-template-columns: minmax(84px, 32%) minmax(0, 1fr);
        gap: 12px;
        min-height: 252px;
        padding: 14px;
        overflow: hidden;
        border: 1px solid rgba(var(--plan-rgb), .9);
        border-radius: 24px;
        background:
          radial-gradient(circle at 12% 10%, rgba(var(--plan-rgb), .27), transparent 46%),
          linear-gradient(145deg, rgba(255,255,255,.13), rgba(2,8,20,.44));
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.18),
          0 0 0 2px rgba(var(--plan-rgb), .2),
          0 18px 38px rgba(0,0,0,.25);
        backdrop-filter: blur(18px) saturate(1.1);
        -webkit-backdrop-filter: blur(18px) saturate(1.1);
      }
      .ang-plan-visual {
        display: grid;
        place-items: center;
        min-width: 0;
        border: 1px solid rgba(255,255,255,.22);
        border-radius: 20px;
        background: rgba(255,255,255,.08);
        color: rgb(var(--plan-rgb));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
      }
      .ang-plan-visual span {
        font-size: clamp(42px, 14vw, 72px);
        font-weight: 300;
        filter: drop-shadow(0 0 16px rgba(var(--plan-rgb), .38));
      }
      .ang-plan-copy {
        display: flex;
        min-width: 0;
        flex-direction: column;
        justify-content: center;
      }
      .ang-plan-copy small {
        color: rgba(255,255,255,.76);
        font-size: 9px;
        font-weight: 1000;
        letter-spacing: .12em;
      }
      .ang-plan-copy h3 {
        margin: 4px 0 6px;
        color: #fff;
        font-size: clamp(18px, 5vw, 24px);
        line-height: 1.12;
      }
      .ang-plan-copy p {
        margin: 0;
        color: rgba(244,248,255,.88);
        font-size: clamp(11px, 3.1vw, 13px);
        line-height: 1.55;
      }
      .ang-plan-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .ang-plan-tags span {
        padding: 5px 8px;
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 999px;
        background: rgba(255,255,255,.12);
        color: #fff;
        font-size: 9px;
        font-weight: 850;
        white-space: nowrap;
      }
      .ang-plan-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }
      .ang-plan-tab {
        min-width: 0;
        min-height: 60px;
        padding: 8px 6px;
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 15px;
        background: rgba(255,255,255,.07);
        color: rgba(242,247,255,.78);
        text-align: left;
      }
      .ang-plan-tab:nth-child(4),
      .ang-plan-tab:nth-child(5) { grid-column: span 1; }
      .ang-plan-tab strong,
      .ang-plan-tab small { display: block; overflow: hidden; text-overflow: ellipsis; }
      .ang-plan-tab strong { color: inherit; font-size: 12px; white-space: nowrap; }
      .ang-plan-tab small { margin-top: 4px; font-size: 9px; opacity: .72; white-space: nowrap; }
      .ang-plan-tab.active {
        border-color: rgba(var(--tab-rgb), .95);
        background: linear-gradient(145deg, rgba(var(--tab-rgb), .34), rgba(var(--tab-rgb), .12));
        color: #fff;
        box-shadow: 0 0 18px rgba(var(--tab-rgb), .24), inset 0 1px 0 rgba(255,255,255,.18);
      }
      .ang-five-plan-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .ang-five-plan-actions button {
        min-height: 42px;
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 14px;
        background: rgba(255,255,255,.09);
        color: #fff;
        font-weight: 900;
      }
      .ang-five-plan-actions button:last-child {
        border-color: rgba(var(--plan-rgb), .7);
        background: linear-gradient(135deg, rgba(var(--plan-rgb), .8), rgba(var(--plan-rgb), .45));
      }
      .landing:not(.night) .ang-five-plan-shell { color: #102448; }
      .landing:not(.night) .ang-five-plan-header small { color: rgba(20,46,86,.66); }
      .landing:not(.night) .ang-five-plan-header h2 { color: #102448; }
      .landing:not(.night) .ang-five-plan-close { background: rgba(255,255,255,.58); color: #12213d; }
      .landing:not(.night) .ang-plan-showcase {
        background:
          radial-gradient(circle at 12% 10%, rgba(var(--plan-rgb), .17), transparent 48%),
          linear-gradient(145deg, rgba(255,255,255,.78), rgba(225,233,250,.52));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 18px 38px rgba(55,74,115,.16);
      }
      .landing:not(.night) .ang-plan-visual { background: rgba(255,255,255,.5); }
      .landing:not(.night) .ang-plan-copy small,
      .landing:not(.night) .ang-plan-copy p { color: rgba(20,41,78,.78); }
      .landing:not(.night) .ang-plan-copy h3 { color: #142a50; }
      .landing:not(.night) .ang-plan-tags span {
        border-color: rgba(28,55,98,.14);
        background: rgba(255,255,255,.55);
        color: #1d365f;
      }
      .landing:not(.night) .ang-plan-tab {
        border-color: rgba(34,64,111,.15);
        background: rgba(255,255,255,.42);
        color: rgba(22,45,82,.76);
      }
      .landing:not(.night) .ang-plan-tab.active { color: #132b50; }
      .landing:not(.night) .ang-five-plan-actions button {
        border-color: rgba(24,50,90,.18);
        background: rgba(255,255,255,.55);
        color: #18335e;
      }
      .landing:not(.night) .ang-five-plan-actions button:last-child { color: #fff; }
      @media (max-width: 390px) {
        .manager-card.intro.expanded .feature-modal-inline { padding-inline: 9px !important; }
        .ang-plan-showcase { grid-template-columns: 88px minmax(0,1fr); min-height: 238px; padding: 11px; gap: 10px; }
        .ang-plan-tabs { gap: 6px; }
        .ang-plan-tab { min-height: 56px; padding-inline: 5px; }
      }
      @media (max-height: 720px) {
        .ang-plan-showcase { min-height: 205px; }
        .ang-plan-copy p { line-height: 1.4; }
        .ang-plan-tags { margin-top: 7px; }
        .ang-plan-tabs { grid-template-columns: repeat(5, minmax(0,1fr)); }
        .ang-plan-tab { min-height: 50px; text-align: center; }
        .ang-plan-tab small { display: none; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <noscript>ANG HR 需要啟用 JavaScript 才能使用。</noscript>

    <script defer src="./viewport-lock.js?v=20260722-viewport-lock-v1"></script>
    <script defer src="./manager-welcome.js?v=20260722-v070-glass-detail-v3"></script>

    <script id="ang-entry-five-plan-patch-script">
      (function () {
        'use strict';

        var plans = [
          {
            key: 'basic', family: 'BUSINESS', name: 'Basic', price: 'NT$299／月', icon: '▥', rgb: '47,115,217',
            title: '核心管理先上線，團隊立即能用',
            description: '員工主檔、排班、定位打卡、QR／手動備援、週選休／月選休與出勤工時總覽，適合第一次把紙本或群組流程搬進系統的團隊。',
            tags: ['員工主檔', '排班發布', 'GPS／QR', '出勤總覽']
          },
          {
            key: 'pro', family: 'BUSINESS', name: 'Pro', price: 'NT$599／月', icon: '⌘', rgb: '233,78,155',
            title: '從排班出勤，進一步完成協作管理',
            description: '包含 Basic，並加入請假與補卡審核、公告留言、完整薪資、NFC、臨時支援打卡點，以及主管與角色權限。',
            tags: ['審核流程', '薪資管理', 'NFC', '支援打卡']
          },
          {
            key: 'premium', family: 'BUSINESS', name: 'Premium', price: 'NT$999／月', icon: '◆', rgb: '72,32,122',
            title: '完整權限、彈性最高，支援多店成長',
            description: '包含 Pro，開放多公司／多分店、完整七層職級、進階績效分析、自訂簽核、安全稽核與最高 Module 擴充彈性。',
            tags: ['多分店', '七層職級', '進階報表', 'Module']
          },
          {
            key: 'solo', family: 'PERSONAL', name: 'Solo', price: 'NT$69／月', icon: '◎', rgb: '120,99,217',
            title: '把自己的工時、排班與收入整理清楚',
            description: '個人排班打卡、完整工時、週選休／月選休、請假補卡、加班紀錄、薪資收入、週領／月領、提醒與歷史查詢。',
            tags: ['個人排班', '工時紀錄', '薪資收入', '提醒備份']
          },
          {
            key: 'performance', family: 'PERSONAL', name: 'Performance', price: 'NT$149／月', icon: '↗', rgb: '201,77,181',
            title: '從記錄工作，進一步看見成長',
            description: '包含 Solo 的日常管理，再加入目標 KPI、績效週期、自評與主管評核、一對一回饋、趨勢分析與績效報表。',
            tags: ['KPI 目標', '績效週期', '成長趨勢', '完整報表']
          }
        ];

        var activeIndex = 0;
        var autoTimer = 0;
        var patchQueued = false;

        function escapeHtml(value) {
          return String(value).replace(/[&<>"']/g, function (char) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
          });
        }

        function goToCard(key) {
          var card = document.querySelector('[data-manager-card="' + key + '"]');
          var intro = document.querySelector('[data-manager-card="intro"]');
          if (intro && intro.classList.contains('expanded')) {
            var toggle = intro.querySelector('.manager-card-toggle');
            if (toggle) toggle.click();
          }
          window.setTimeout(function () {
            if (!card) return;
            var carousel = card.closest('.manager-carousel');
            if (!carousel) return;
            var left = Math.max(0, card.offsetLeft - (carousel.clientWidth - card.clientWidth) / 2);
            carousel.scrollTo({ left: left, behavior: 'smooth' });
          }, 80);
        }

        function render(root, index) {
          if (!root) return;
          activeIndex = (index + plans.length) % plans.length;
          var plan = plans[activeIndex];
          root.innerHTML = [
            '<section class="ang-five-plan-shell" style="--plan-rgb:' + plan.rgb + '" aria-label="五個方案介紹">',
              '<header class="ang-five-plan-header">',
                '<div><small>ANG HR｜5 PLAN INTRODUCTIONS</small><h2>選擇方案介紹</h2></div>',
                '<button type="button" class="ang-five-plan-close" aria-label="收合卡片">×</button>',
              '</header>',
              '<article class="ang-plan-showcase" aria-live="polite">',
                '<div class="ang-plan-visual" aria-hidden="true"><span>' + escapeHtml(plan.icon) + '</span></div>',
                '<div class="ang-plan-copy">',
                  '<small>' + escapeHtml(plan.family + ' / ' + plan.name) + '</small>',
                  '<h3>' + escapeHtml(plan.title) + '</h3>',
                  '<p>' + escapeHtml(plan.description) + '</p>',
                  '<div class="ang-plan-tags">' + plan.tags.map(function (tag) { return '<span>' + escapeHtml(tag) + '</span>'; }).join('') + '</div>',
                '</div>',
              '</article>',
              '<div class="ang-plan-tabs" role="tablist" aria-label="切換五個方案">',
                plans.map(function (item, itemIndex) {
                  return '<button type="button" role="tab" class="ang-plan-tab' + (itemIndex === activeIndex ? ' active' : '') + '" data-plan-index="' + itemIndex + '" style="--tab-rgb:' + item.rgb + '" aria-selected="' + (itemIndex === activeIndex ? 'true' : 'false') + '"><strong>' + escapeHtml(item.name) + '</strong><small>' + escapeHtml(item.price) + '</small></button>';
                }).join(''),
              '</div>',
              '<div class="ang-five-plan-actions">',
                '<button type="button" data-go-card="login">登入／註冊</button>',
                '<button type="button" data-go-card="' + (plan.family === 'BUSINESS' ? 'business' : 'personal') + '">查看完整方案</button>',
              '</div>',
            '</section>'
          ].join('');

          root.querySelectorAll('[data-plan-index]').forEach(function (button) {
            button.addEventListener('click', function () {
              window.clearInterval(autoTimer);
              render(root, Number(button.getAttribute('data-plan-index')) || 0);
              startAuto(root);
            });
          });
          var close = root.querySelector('.ang-five-plan-close');
          if (close) close.addEventListener('click', function () {
            var toggle = document.querySelector('[data-manager-card="intro"] .manager-card-toggle');
            if (toggle) toggle.click();
          });
          root.querySelectorAll('[data-go-card]').forEach(function (button) {
            button.addEventListener('click', function () { goToCard(button.getAttribute('data-go-card')); });
          });
        }

        function startAuto(root) {
          window.clearInterval(autoTimer);
          autoTimer = window.setInterval(function () {
            if (!document.body.contains(root)) {
              window.clearInterval(autoTimer);
              return;
            }
            render(root, activeIndex + 1);
          }, 6500);
        }

        function patchSwipeDirections() {
          var left = document.querySelector('.gesture-directions .swipe-left em');
          var right = document.querySelector('.gesture-directions .swipe-right em');
          if (left && left.textContent !== '右滑登入系統') left.textContent = '右滑登入系統';
          if (right && right.textContent !== '左滑查看方案') right.textContent = '左滑查看方案';
        }

        function patchIntro() {
          patchSwipeDirections();
          var modal = document.querySelector('[data-manager-card="intro"].expanded .feature-modal-inline');
          if (!modal || modal.querySelector('.ang-five-plan-shell')) return;
          render(modal, activeIndex);
          startAuto(modal);
        }

        function queuePatch() {
          if (patchQueued) return;
          patchQueued = true;
          requestAnimationFrame(function () {
            patchQueued = false;
            patchIntro();
          });
        }

        function boot() {
          patchIntro();
          new MutationObserver(queuePatch).observe(document.body, { childList: true, subtree: true });
          window.addEventListener('resize', queuePatch, { passive: true });
          window.visualViewport && window.visualViewport.addEventListener('resize', queuePatch, { passive: true });
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
        else boot();
      }());
    </script>
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return;
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js?v=20260722-viewport-lock-v1', { scope: './' }).catch(function (error) {
            console.warn('[ANG HR PWA] Service Worker 註冊失敗：', error);
          });
        });
      }());
    </script>
  </body>
