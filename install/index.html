<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ANG HR｜選擇主畫面圖示</title>
  <meta name="theme-color" content="#07114f">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}
    body{
      min-height:100dvh;display:grid;place-items:center;padding:24px;
      color:#fff;background:
        radial-gradient(circle at 20% 10%,rgba(0,220,255,.22),transparent 35%),
        radial-gradient(circle at 80% 90%,rgba(190,0,255,.22),transparent 35%),
        linear-gradient(160deg,#050a35,#0b124f 55%,#170b47);
    }
    .panel{
      width:min(720px,100%);padding:28px;border:1px solid rgba(255,255,255,.16);
      border-radius:28px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);
      box-shadow:0 24px 80px rgba(0,0,0,.28)
    }
    h1{margin:0 0 8px;text-align:center;font-size:clamp(28px,5vw,44px)}
    p{margin:0 0 24px;text-align:center;color:rgba(255,255,255,.76)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    a{
      color:inherit;text-decoration:none;border-radius:24px;padding:16px;
      border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);
      transition:.18s transform,.18s background
    }
    a:hover{transform:translateY(-3px);background:rgba(255,255,255,.14)}
    img{display:block;width:100%;aspect-ratio:1;border-radius:22%;object-fit:cover}
    strong{display:block;margin-top:14px;text-align:center;font-size:20px}
    small{display:block;margin-top:5px;text-align:center;color:rgba(255,255,255,.66)}
    .note{margin-top:22px;font-size:14px;line-height:1.65}
    @media(max-width:560px){.grid{grid-template-columns:1fr}.panel{padding:20px}}
  </style>
</head>
<body>
  <main class="panel">
    <h1>ANG HR</h1>
    <p>請先選擇要顯示在主畫面的圖示</p>
    <section class="grid">
      <a href="./day/">
        <img src="../assets/icons/day/icon-512.png" alt="日光版圖示">
        <strong>日光版</strong>
        <small>白色雲霧背景・深藍標誌</small>
      </a>
      <a href="./night/">
        <img src="../assets/icons/night/icon-512.png" alt="暗夜版圖示">
        <strong>暗夜版</strong>
        <small>深藍星空背景・白色標誌</small>
      </a>
    </section>
    <p class="note">選擇後，請用瀏覽器選單的「加入主畫面」。若以前裝過，請先刪除舊圖示再重新加入。</p>
  </main>
</body>
</html>
