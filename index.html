    <script>
      (function () {
        'use strict';

        var gesture = null;
        var suppressClickUntil = 0;
        var SWIPE_THRESHOLD = 24;
        var ANIMATION_MS = 240;

        function isInteractive(target) {
          return !!(target && target.closest && target.closest(
            'input, textarea, select, option, a, button, [role="button"], [contenteditable="true"]'
          ));
        }

        function getCards(carousel) {
          return Array.prototype.filter.call(carousel.children || [], function (item) {
            return item && item.classList && item.classList.contains('manager-card');
          });
        }

        function centerLeft(carousel, card) {
          return Math.max(0, card.offsetLeft - (carousel.clientWidth - card.clientWidth) / 2);
        }

        function centerCard(carousel, card, smooth) {
          if (!carousel || !card) return;
          carousel.style.scrollSnapType = 'none';
          carousel.style.scrollBehavior = 'auto';
          carousel.scrollTo({
            left: centerLeft(carousel, card),
            behavior: smooth ? 'smooth' : 'auto'
          });
          window.setTimeout(function () {
            carousel.style.scrollSnapType = '';
            carousel.style.scrollBehavior = '';
          }, smooth ? ANIMATION_MS + 40 : 0);
        }

        function collapseCard(card) {
          if (!card || !card.classList.contains('expanded')) return;
          var toggle = card.querySelector('.manager-card-toggle');
          if (toggle) toggle.click();
        }

        function removeWindowListeners() {
          window.removeEventListener('pointermove', onPointerMove, true);
          window.removeEventListener('pointerup', onPointerEnd, true);
          window.removeEventListener('pointercancel', onPointerEnd, true);
        }

        function finishGesture(event) {
          if (!gesture || (event && event.pointerId !== gesture.pointerId)) return;
          var state = gesture;
          gesture = null;
          removeWindowListeners();

          if (event && state.axis === 'x') {
            event.preventDefault();
            event.stopImmediatePropagation();
          }

          if (!state.committed) centerCard(state.carousel, state.card, false);
        }

        function commitSwipe(direction, event) {
          if (!gesture || gesture.committed) return;
          gesture.committed = true;
          suppressClickUntil = Date.now() + 360;

          event.preventDefault();
          event.stopImmediatePropagation();

          var cards = getCards(gesture.carousel);
          var index = cards.indexOf(gesture.card);
          var targetIndex = Math.max(0, Math.min(cards.length - 1, index + direction));
          var target = cards[targetIndex] || gesture.card;

          collapseCard(gesture.card);
          window.requestAnimationFrame(function () {
            centerCard(gesture.carousel, target, true);
          });
        }

        function onPointerMove(event) {
          if (!gesture || event.pointerId !== gesture.pointerId) return;

          var dx = event.clientX - gesture.startX;
          var dy = event.clientY - gesture.startY;

          if (!gesture.axis && Math.max(Math.abs(dx), Math.abs(dy)) >= 8) {
            gesture.axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
          }

          if (gesture.axis !== 'x') return;

          event.preventDefault();
          event.stopImmediatePropagation();

          if (Math.abs(dx) >= SWIPE_THRESHOLD) {
            commitSwipe(dx < 0 ? 1 : -1, event);
          }
        }

        function onPointerEnd(event) {
          finishGesture(event);
        }

        function onPointerDown(event) {
          if (!event.isPrimary || event.button > 0 || isInteractive(event.target)) return;

          var card = event.target && event.target.closest ? event.target.closest('.manager-card') : null;
          if (!card) return;

          var carousel = card.closest('.manager-carousel');
          if (!carousel) return;

          if (gesture) finishGesture(null);

          gesture = {
            pointerId: event.pointerId,
            card: card,
            carousel: carousel,
            startX: event.clientX,
            startY: event.clientY,
            axis: null,
            committed: false
          };

          window.addEventListener('pointermove', onPointerMove, { capture: true, passive: false });
          window.addEventListener('pointerup', onPointerEnd, true);
          window.addEventListener('pointercancel', onPointerEnd, true);
        }

        function prepareCarousels() {
          document.querySelectorAll('.manager-carousel').forEach(function (carousel) {
            carousel.style.touchAction = 'pan-y';
            carousel.style.overscrollBehaviorX = 'contain';
          });
        }

        document.addEventListener('pointerdown', onPointerDown, true);
        document.addEventListener('click', function (event) {
          if (Date.now() >= suppressClickUntil) return;
          if (!event.target.closest('.manager-card')) return;
          event.preventDefault();
          event.stopImmediatePropagation();
        }, true);

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', prepareCarousels);
        } else {
          prepareCarousels();
        }

        new MutationObserver(function () {
          window.requestAnimationFrame(prepareCarousels);
        }).observe(document.documentElement, { childList: true, subtree: true });
      }());
    </script>
