        window.__ANG_ENTRY_PLANS__ = plans;

        var activeIndex = 0;
        var autoTimer = 0;
        var patchQueued = false;

        function escapeHtml(value) {
          return String(value).replace(/[&<>"']/g, function (char) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
          });
        }

        function goToCard(key) {
          var card = document.querySelector('[data-manager-card="' + key + '"]');
          var intro = document.querySelector('[data-manager-card="intro"]');
          if (intro && intro.classList.contains('expanded')) {
            var toggle = intro.querySelector('.manager-card-toggle');
            if (toggle) toggle.click();
          }
          window.setTimeout(function () {
            if (!card) return;
            var carousel = card.closest('.manager-carousel');
            if (!carousel) return;
            var left = Math.max(0, card.offsetLeft - (carousel.clientWidth - card.clientWidth) / 2);
            carousel.scrollTo({ left: left, behavior: 'smooth' });
          }, 80);
        }

        function render(root, index) {
          if (!root) return;
          activeIndex = (index + plans.length) % plans.length;
          var plan = plans[activeIndex];
          root.innerHTML = [
            '<section class="ang-five-plan-shell" style="--plan-rgb:' + plan.rgb + '" aria-label="五個方案介紹">',
              '<header class="ang-five-plan-header">',
                '<div><small>ANG HR｜5 PLAN INTRODUCTIONS</small><h2>選擇方案介紹</h2></div>',
                '<button type="button" class="ang-five-plan-close" aria-label="收合卡片">×</button>',
              '</header>',
              '<article class="ang-plan-showcase" aria-live="polite">',
                '<div class="ang-plan-visual" aria-hidden="true"><span>' + escapeHtml(plan.icon) + '</span></div>',
                '<div class="ang-plan-copy">',
                  '<div class="ang-plan-family-title family-' + plan.family.toLowerCase() + '">' + escapeHtml(plan.family) + '</div>',
                  '<div class="ang-plan-family-subtitle">' + escapeHtml(plan.familyZh || '') + '</div>',
                  '<div class="ang-plan-tier-badge metal-' + escapeHtml(plan.tier || 'silver') + '">' + escapeHtml(plan.family + ' ' + plan.name) + '</div>',
                  '<h3>' + escapeHtml(plan.title) + '</h3>',
                  '<p>' + escapeHtml(plan.description) + '</p>',
                  '<div class="ang-plan-tags">' + plan.tags.map(function (tag) { return '<span>' + escapeHtml(tag) + '</span>'; }).join('') + '</div>',
                '</div>',
              '</article>',
              '<div class="ang-plan-tabs" role="tablist" aria-label="切換五個方案">',
                plans.map(function (item, itemIndex) {
                  return '<button type="button" role="tab" class="ang-plan-tab metal-' + escapeHtml(item.tier || 'silver') + (itemIndex === activeIndex ? ' active' : '') + '" data-plan-index="' + itemIndex + '" style="--tab-rgb:' + item.rgb + '" aria-selected="' + (itemIndex === activeIndex ? 'true' : 'false') + '"><strong>' + escapeHtml(item.family + ' ' + item.name) + '</strong><small>' + escapeHtml(item.price) + '</small></button>';
                }).join(''),
              '</div>',
              '<div class="ang-five-plan-actions">',
                '<button type="button" data-go-card="login">登入／註冊</button>',
                '<button type="button" data-go-card="' + (plan.family === 'BUSINESS' ? 'business' : 'personal') + '">查看完整方案</button>',
              '</div>',
            '</section>'
          ].join('');

          root.querySelectorAll('[data-plan-index]').forEach(function (button) {
            button.addEventListener('click', function () {
              window.clearInterval(autoTimer);
              render(root, Number(button.getAttribute('data-plan-index')) || 0);
              startAuto(root);
            });
          });
          var close = root.querySelector('.ang-five-plan-close');
          if (close) close.addEventListener('click', function () {
            var toggle = document.querySelector('[data-manager-card="intro"] .manager-card-toggle');
            if (toggle) toggle.click();
          });
          root.querySelectorAll('[data-go-card]').forEach(function (button) {
            button.addEventListener('click', function () { goToCard(button.getAttribute('data-go-card')); });
          });
        }

        function startAuto(root) {
          window.clearInterval(autoTimer);
          autoTimer = window.setInterval(function () {
            if (!document.body.contains(root)) {
              window.clearInterval(autoTimer);
              return;
            }
            render(root, activeIndex + 1);
          }, 6500);
        }

        function patchSwipeDirections() {
          var left = document.querySelector('.gesture-directions .swipe-left em');
          var right = document.querySelector('.gesture-directions .swipe-right em');
          if (left && left.textContent !== '右滑登入系統') left.textContent = '右滑登入系統';
          if (right && right.textContent !== '左滑查看方案') right.textContent = '左滑查看方案';
        }

        function patchIntro() {
          patchSwipeDirections();
          var modal = document.querySelector('[data-manager-card="intro"].expanded .feature-modal-inline');
          if (!modal || modal.querySelector('.ang-five-plan-shell')) return;
          render(modal, activeIndex);
          startAuto(modal);
        }

        function queuePatch() {
          if (patchQueued) return;
          patchQueued = true;
          requestAnimationFrame(function () {
            patchQueued = false;
            patchIntro();
          });
        }

        function boot() {
          patchIntro();
          new MutationObserver(queuePatch).observe(document.body, { childList: true, subtree: true });
          window.addEventListener('resize', queuePatch, { passive: true });
          window.visualViewport && window.visualViewport.addEventListener('resize', queuePatch, { passive: true });
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
        else boot();
      }());
    </script>

    <script id="ang-entry-login-flow-patch">
      (function(){
        'use strict';
        var selectedPlan=null;
        var planColors={
          basic:{main:'#21113e',accent:'#c77a46'},
          pro:{main:'#21113e',accent:'#c9d0dc'},
          premium:{main:'#21113e',accent:'#e7c66f'},
          solo:{main:'#8f174f',accent:'#c9d0dc'},
          performance:{main:'#8f174f',accent:'#e7c66f'},
          lite_business:{main:'#123f73',accent:'#e7c66f'},
          lite_personal:{main:'#123f73',accent:'#c9d0dc'}
        };
        function dialog(title,message,leftText,rightText,onLeft,onRight){
          var old=document.querySelector('.ang-account-dialog-backdrop'); if(old)old.remove();
          var wrap=document.createElement('div'); wrap.className='ang-account-dialog-backdrop';
          wrap.innerHTML='<section class="ang-account-dialog" role="dialog" aria-modal="true"><h3>'+title+'</h3><p>'+message+'</p><div class="ang-account-dialog-actions"><button type="button" data-left>'+leftText+'</button><button type="button" data-right>'+rightText+'</button></div></section>';
          document.body.appendChild(wrap);
          wrap.querySelector('[data-left]').onclick=function(){wrap.remove();onLeft&&onLeft()};
          wrap.querySelector('[data-right]').onclick=function(){wrap.remove();onRight&&onRight()};
        }
        function focusAccount(){
          var input=document.querySelector('input[type="email"],input[autocomplete="email"],input[placeholder*="Email" i],input[placeholder*="帳號"]');
          if(input){input.focus();try{input.select()}catch(e){}}
        }
        function goPlans(){
          var card=document.querySelector('[data-manager-card="business"],[data-manager-card="personal"]');
          if(card){var c=card.closest('.manager-carousel');if(c)c.scrollTo({left:Math.max(0,card.offsetLeft-(c.clientWidth-card.clientWidth)/2),behavior:'smooth'})}
        }
        function registerDirect(){
          window.dispatchEvent(new CustomEvent('ang:begin-registration',{detail:{plan:selectedPlan}}));
          document.documentElement.dataset.angRegistration='1';
        }
        function directLogin(){
          window.dispatchEvent(new CustomEvent('ang:direct-login',{detail:{plan:selectedPlan}}));
        }
        function handleAccountStatus(detail){
          detail=detail||{};
          var exists=detail.exists===true||detail.registered===true||detail.status==='registered';
          if(selectedPlan){
            if(exists){
              dialog('此帳號已註冊','要直接登入原有帳號，還是更換另一個帳號？','更換帳號','直接登入',focusAccount,directLogin);
            }else{
              registerDirect();
            }
          }else if(!exists){
            dialog('查無此帳號或 Email','目前找不到已註冊的資料。你可以重新輸入，或先查看適合的方案。','重新輸入','查看方案',focusAccount,goPlans);
          }
        }
        function patchButtons(){
          document.querySelectorAll('button').forEach(function(btn){
            var txt=(btn.textContent||'').trim();
            var nearInput=btn.parentElement&&btn.parentElement.querySelector('input');
            if(nearInput && (/^[✓✔勾]$/.test(txt)||/驗證|確認|GO|Go|go/.test(txt))){
              btn.textContent='Enter'; btn.classList.add('ang-enter-button');
              var key=selectedPlan&&selectedPlan.key; var color=planColors[key]||{main:'#123f73',accent:'#e7c66f'};
              btn.style.setProperty('--go-main',color.main); btn.style.setProperty('--go-accent',color.accent);
            }
          });
          document.querySelectorAll('[data-go-card]').forEach(function(btn){
            if(btn.dataset.angPlanBound)return; btn.dataset.angPlanBound='1';
            btn.addEventListener('click',function(){
              var shell=btn.closest('.ang-five-plan-shell'); if(!shell)return;
              var active=shell.querySelector('.ang-plan-tab.active');
              if(active){var idx=Number(active.getAttribute('data-plan-index'));var all=window.__ANG_ENTRY_PLANS__||[];selectedPlan=all[idx]||selectedPlan;sessionStorage.setItem('ANG_SELECTED_PLAN',JSON.stringify(selectedPlan||{}));}
            },true);
          });
        }
        try{selectedPlan=JSON.parse(sessionStorage.getItem('ANG_SELECTED_PLAN')||'null')}catch(e){}
        window.ANG_HR_ENTRY=window.ANG_HR_ENTRY||{};
        window.ANG_HR_ENTRY.handleAccountStatus=handleAccountStatus;
        window.ANG_HR_ENTRY.getSelectedPlan=function(){return selectedPlan};
        window.addEventListener('ang:account-status',function(e){handleAccountStatus(e.detail)});
        new MutationObserver(patchButtons).observe(document.body,{childList:true,subtree:true});
        patchButtons();
      }());
    </script>


    <script id="ang-entry-magnetic-gesture-patch">
      (function(){
        'use strict';
        var threshold=10;
        var busy=false;
        function cards(carousel){return Array.prototype.slice.call(carousel.querySelectorAll('.manager-card'))}
        function currentIndex(carousel,list){
          var center=carousel.scrollLeft+carousel.clientWidth/2, best=0, dist=Infinity;
          list.forEach(function(card,i){var c=card.offsetLeft+card.offsetWidth/2,d=Math.abs(c-center);if(d<dist){dist=d;best=i}});
          return best;
        }
        function centerCard(carousel,card){
          if(!card)return;
          var left=Math.max(0,card.offsetLeft-(carousel.clientWidth-card.clientWidth)/2);
          busy=true;
          carousel.scrollTo({left:left,behavior:'smooth'});
          window.setTimeout(function(){busy=false},340);
        }
        function toggleVertical(card,up){
          if(!card)return;
          var expanded=card.classList.contains('expanded');
          var toggle=card.querySelector('.manager-card-toggle');
          if(up&&!expanded&&toggle)toggle.click();
          if(!up&&expanded&&toggle)toggle.click();
        }
        function install(carousel){
          if(!carousel||carousel.dataset.angMagneticSwipe==='1')return;
          carousel.dataset.angMagneticSwipe='1';
          var sx=0,sy=0,tracking=false;
          carousel.addEventListener('touchstart',function(e){
            if(!e.touches||!e.touches[0]||busy)return;
            sx=e.touches[0].clientX;sy=e.touches[0].clientY;tracking=true;
          },{capture:true,passive:true});
          carousel.addEventListener('touchmove',function(e){
            if(tracking)e.preventDefault();
          },{capture:true,passive:false});
          carousel.addEventListener('touchend',function(e){
            if(!tracking)return;tracking=false;
            var t=e.changedTouches&&e.changedTouches[0];if(!t)return;
            var dx=t.clientX-sx,dy=t.clientY-sy;
            if(Math.max(Math.abs(dx),Math.abs(dy))<threshold)return;
            e.preventDefault();e.stopPropagation();
            var list=cards(carousel),idx=currentIndex(carousel,list),card=list[idx];
            if(Math.abs(dx)>=Math.abs(dy)){
              if(card&&card.classList.contains('expanded')){var tg=card.querySelector('.manager-card-toggle');if(tg)tg.click()}
              /* 手指往右＝前一張；手指往左＝下一張。 */
              idx=dx>0?Math.max(0,idx-1):Math.min(list.length-1,idx+1);
              window.setTimeout(function(){centerCard(carousel,list[idx])},30);
            }else{
              toggleVertical(card,dy<0);
            }
          },{capture:true,passive:false});
          carousel.addEventListener('touchcancel',function(){tracking=false},{capture:true,passive:true});
        }
        function boot(){document.querySelectorAll('.manager-carousel').forEach(install)}
        if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
        new MutationObserver(boot).observe(document.body,{childList:true,subtree:true});
      }());
    </script>
